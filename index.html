<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtrAds</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #040d06; /* Fundo verde ultra escuro */
            color: #fff;
        }

        /* Container principal em Grid para dividir a tela ao meio */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Logo central substituindo o antigo "OU" */
        .center-logo {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none; /* Não atrapalha o clique */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-logo img {
            height: 300px; /* Logo em tamanho considerável */
            width: auto;
            object-fit: contain;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        /* Animação de pulse */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .center-logo:hover img {
            animation: pulse 0.6s ease-in-out infinite;
        }

        /* Estilo comum para os dois lados */
        .side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #fff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-align: center;
        }

        /* Lado do E-commerce - Gradiente sobreposto verde escuro */
        .ecommerce {
            background: linear-gradient(rgba(4, 13, 6, 0.65), rgba(4, 13, 6, 0.85)), 
                        url('https://images.unsplash.com/photo-1563013544-824ae1d704d3?q=80&w=1200') center/cover no-repeat;
        }

        /* Lado do Freelancing - Gradiente sobreposto verde escuro */
        .freelancing {
            background: linear-gradient(rgba(4, 13, 6, 0.65), rgba(4, 13, 6, 0.85)), 
                        url('https://images.unsplash.com/photo-1563013544-824ae1d704d3?q=80&w=1200') center/cover no-repeat;
        }

        /* Elementos de texto */
        .side h2 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e6f7eb;
            transition: transform 0.4s ease, color 0.4s ease;
            font-family: 'Poppins', sans-serif;
        }

        .side p {
            font-size: 1.1rem;
            max-width: 400px;
            opacity: 0.75;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #b3d9bc;
        }

        /* Botão de Ação estilizado com a nova paleta */
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 35px;
            border: 2px solid #2bb34b;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: transparent;
            color: #2bb34b;
            transition: all 0.4s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }

        /* Container dos Cards Redondos (Marketplaces) */
        .marketplaces-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        /* Estilo dos cards redondos */
        .card-round {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(4, 13, 6, 0.6);
            border: 2px solid rgba(43, 179, 75, 0.4);
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            text-decoration: none;
            padding: 12px;
        }

        .card-round img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.4s ease;
        }

        /* Efeito de hover nos cards redondos */
        .card-round:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
            background: rgba(4, 13, 6, 0.9);
        }

        /* Botão do GitHub Fixo no Canto Inferior Direito */
        .github-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            background: rgba(4, 13, 6, 0.8);
            border: 2px solid #2bb34b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }

        .github-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Efeito de Hover do Botão GitHub */
        .github-btn:hover {
            transform: scale(1.1) rotate(8deg);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(43, 179, 75, 0.6);
            background: #040d06;
        }

        /* Efeitos de Hover da estrutura principal */
        .container:has(.ecommerce:hover) .ecommerce { grid-column: span 1.2; }
        .container:has(.ecommerce:hover) .freelancing { grid-column: span 0.8; }
        
        .container:has(.freelancing:hover) .freelancing { grid-column: span 1.2; }
        .container:has(.freelancing:hover) .ecommerce { grid-column: span 0.8; }

        /* Destaque interno ao passar o mouse */
        .side:hover h2 {
            transform: scale(1.05);
            color: #4ade80;
        }

        .btn:hover {
            background: #2bb34b;
            color: #040d06;
            box-shadow: 0 0 20px rgba(43, 179, 75, 0.6);
            border-color: #2bb34b;
        }

        /* Responsividade para Celulares (Telas verticais) */
        @media (max-width: 768px) {
            body, html {
                overflow: auto;
            }
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                height: auto;
                min-height: 100vh;
            }
            .side {
                padding: 60px 20px;
                height: 50vh;
            }
            .side h2 {
                font-size: 2rem;
            }
            .center-logo {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 10px 20px;
            }
            .center-logo img {
                height: 30px;
            }
            .card-round {
                width: 60px;
                height: 60px;
            }
            /* Ajuste posicional do botão do GitHub no mobile para não atrapalhar a rolagem */
            .github-btn {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
            }
            /* Desativa o efeito de expansão lateral no mobile */
            .container:has(.ecommerce:hover) .ecommerce,
            .container:has(.ecommerce:hover) .freelancing,
            .container:has(.freelancing:hover) .freelancing,
            .container:has(.freelancing:hover) .ecommerce {
                grid-column: unset;
                grid-row: unset;
            }
        }
    </style>
</head>
<body>

    <div class="center-logo">
        <img src="Logo-ExtrAds-removebg.png" alt="Logo ExtrAds">
    </div>

    <div class="container">
        
        <div class="side ecommerce">
            <h2>E-Commerce</h2>
            <p>Explore nossa loja virtual. Produtos exclusivos, ofertas especiais e entrega rápida direto na sua casa.</p>
            
            <div class="marketplaces-container">
                <a href="https://shopee.com.br/shop/1399906613" class="card-round" title="Shopee" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Shopee_logo.svg/1920px-Shopee_logo.svg.png" alt="Shopee">
                </a>
            </div>
        </div>

        <div class="side freelancing">
            <h2>Freelancing</h2>
            <p>Precisa de soluções personalizadas? Conheça meus serviços de desenvolvimento, design e consultoria.</p>
            <a href="#" class="btn">Em Breve</a>
        </div>

    </div>

    <a href="https://github.com/ExtrAds/ExtrAds" class="github-btn" title="Acesse meu GitHub" target="_blank">
        <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="GitHub Logo">
    </a>

</body>
</html>
