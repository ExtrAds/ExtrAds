<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtrAds</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #040d06; 
            color: #fff;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .center-logo {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-logo img {
            height: 300px; 
            width: auto;
            object-fit: contain;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .center-logo:hover img {
            animation: pulse 0.6s ease-in-out infinite;
        }

        .side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #fff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-align: center;
        }

        .ecommerce {
            background: linear-gradient(rgba(4, 13, 6, 0.65), rgba(4, 13, 6, 0.85)), 
                        url('https://images.unsplash.com/photo-1563013544-824ae1d704d3?q=80&w=1200') center/cover no-repeat;
        }

        .lojas {
            background: linear-gradient(rgba(4, 13, 6, 0.65), rgba(4, 13, 6, 0.85)), 
                        url('https://images.unsplash.com/photo-1563013544-824ae1d704d3?q=80&w=1200') center/cover no-repeat;
        }

        .side h2 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e6f7eb;
            transition: transform 0.4s ease, color 0.4s ease;
            font-family: 'Poppins', sans-serif;
        }

        .side p {
            font-size: 1.1rem;
            max-width: 400px;
            opacity: 0.75;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #b3d9bc;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 35px;
            border: 2px solid #2bb34b;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: transparent;
            color: #2bb34b;
            transition: all 0.4s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .marketplaces-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

        .card-round {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(4, 13, 6, 0.6);
            border: 2px solid rgba(43, 179, 75, 0.4);
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            text-decoration: none;
            padding: 12px;
        }

        .card-round img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.4s ease;
        }

        .card-round:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
            background: rgba(4, 13, 6, 0.9);
        }

        /* --- NOVO CONTAINER FLUTUANTE --- */
        .flutuante-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 12px; /* Espaço entre os botões */
            align-items: center;
        }

        /* Ajuste na classe para funcionar dentro do container flex */
        .flutuante-btn {
            width: 50px;
            height: 50px;
            background: rgba(4, 13, 6, 0.8);
            border: 2px solid #2bb34b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px;
        }

        .flutuante-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .flutuante-btn:hover {
            transform: scale(1.1) rotate(8deg);
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(43, 179, 75, 0.6);
            background: #040d06;
        }

        .container:has(.ecommerce:hover) .ecommerce { grid-column: span 1.2; }
        .container:has(.ecommerce:hover) .hubs { grid-column: span 0.8; }
        .container:has(.hubs:hover) .hubs { grid-column: span 1.2; }
        .container:has(.hubs:hover) .ecommerce { grid-column: span 0.8; }

        .side:hover h2 {
            transform: scale(1.05);
            color: #4ade80;
        }

        .btn:hover {
            background: #2bb34b;
            color: #040d06;
            box-shadow: 0 0 20px rgba(43, 179, 75, 0.6);
            border-color: #2bb34b;
        }

        @media (max-width: 768px) {
            body, html {
                overflow: auto;
            }
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                height: auto;
                min-height: 100vh;
            }
            .side {
                padding: 60px 20px;
                height: 50vh;
            }
            .side h2 {
                font-size: 2rem;
            }
            .center-logo {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                padding: 10px 20px;
            }
            .center-logo img {
                height: 30px;
            }
            .card-round {
                width: 60px;
                height: 60px;
            }
            
            /* Ajuste do container para Mobile */
            .flutuante-container {
                bottom: 15px;
                right: 15px;
                gap: 8px;
            }
            .flutuante-btn {
                width: 45px;
                height: 45px;
            }
            
            .container:has(.ecommerce:hover) .ecommerce,
            .container:has(.ecommerce:hover) .lojas,
            .container:has(.lojas:hover) .lojas,
            .container:has(.lojas:hover) .ecommerce {
                grid-column: unset;
                grid-row: unset;
            }
        }
    </style>
</head>
<body>

            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="GitHub Logo">

        <a href="https://seller.shopee.com.br/" class="flutuante-btn" title="Shopee Seller" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Shopee_logo.svg/1920px-Shopee_logo.svg.png" alt="Shopee Seller Logo">
        </a>

         <a href="https://www.nuvemshop.com.br/login" class="flutuante-btn" title="Nuvemshop" target="_blank">

</html>
